<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>IoT Chicken Coop Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>
<h1>🐔 Smart Chicken Coop System</h1>
<p>Admin Dashboard</p>
</header>

<div class="container">

<div class="left-panel">

<div class="card">
<h2>Sensor Monitoring</h2>

<p>Temperature: <span class="value" id="temp">30</span> °C</p>
<p>Humidity: <span class="value" id="humidity">65</span> %</p>

</div>

<div class="card">

<h2>Ventilation Control</h2>

<p>Fan Status: <span class="value" id="fanStatus">OFF</span></p>

<button class="on" onclick="turnOnFan()">Turn ON Fan</button>
<button class="off" onclick="turnOffFan()">Turn OFF Fan</button>

<p class="status" id="message"></p>

</div>

<div class="card">

<h2>System Logs</h2>

<table>

<thead>
<tr>
<th>Date & Time</th>
<th>Temperature</th>
<th>Humidity</th>
<th>Fan</th>
</tr>
</thead>

<tbody id="logTable"></tbody>

</table>

</div>

</div>

<div class="right-panel">

<div class="card">

<h2>Environmental Graph</h2>

<canvas id="sensorChart"></canvas>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
